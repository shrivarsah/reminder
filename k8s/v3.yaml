apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-notes-v3
  labels:
    app: lms-notes
    version: v3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-notes
      version: v3
  template:
    metadata:
      labels:
        app: lms-notes
        version: v3
    spec:
      containers:
        - name: lms-notes-v3
          image: lms-notes-app:v3
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: lms-notes-v3-service
spec:
  selector:
    app: lms-notes
    version: v3
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
