apiVersion: apps/v1
kind: Deployment
metadata:
  name: reminder-v2
  labels:
    app: reminder-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reminder-v2
  template:
    metadata:
      labels:
        app: reminder-v2
    spec:
      containers:
      - name: reminder-v2
        image: YOUR_DOCKERHUB_USERNAME/reminder-app:v2
        ports:
        - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: reminder-v2-service
spec:
  selector:
    app: reminder-v2
  type: NodePort
  ports:
  - protocol: TCP
    port: 3002
    targetPort: 3002
    nodePort: 30002
