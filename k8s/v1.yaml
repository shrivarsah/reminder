apiVersion: apps/v1
kind: Deployment
metadata:
  name: reminder-v1
  labels:
    app: reminder-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reminder-v1
  template:
    metadata:
      labels:
        app: reminder-v1
    spec:
      containers:
      - name: reminder-v1
        image: YOUR_DOCKERHUB_USERNAME/reminder-app:v1
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: reminder-v1-service
spec:
  selector:
    app: reminder-v1
  type: NodePort
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    nodePort: 30001
